<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar Concierge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
      margin: 0;
    }

    nav {
      background: #1565c0;
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    nav a { color: #fff; text-decoration: none; font-weight: 500; }
    nav a:hover { text-decoration: underline; }
    nav .title { font-size: 16px; font-weight: 700; margin-right: auto; }

    main { max-width: 860px; margin: 24px auto; padding: 0 16px; }

    h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #555;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
      margin: 28px 0 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .card .meta { color: #777; font-size: 12px; margin-top: 2px; }
    .card strong { font-size: 13px; }

    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; border: 1px solid #e0e0e0; }
    th { background: #f0f4ff; font-weight: 600; text-align: left; padding: 8px 12px; font-size: 12px; color: #333; }
    td { padding: 8px 12px; border-top: 1px solid #eee; font-size: 13px; }
    tr:hover td { background: #fafafa; }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      vertical-align: middle;
    }
    .badge-saved   { background: #e8f5e9; color: #2e7d32; }
    .badge-unsaved { background: #fafafa; color: #999; border: 1px solid #ddd; }
    .badge-flag    { background: #fff3e0; color: #e65100; }

    .banner {
      padding: 10px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .banner-success { background: #e8f5e9; color: #2e7d32; }
    .banner-partial { background: #fff8e1; color: #f57f17; }
    .banner-failed  { background: #fdecea; color: #c62828; }
    .banner ul { margin: 6px 0 0 0; padding-left: 18px; }

    .alert-card {
      border-left: 3px solid #c62828;
      background: #fff;
      border-radius: 0 6px 6px 0;
      padding: 10px 14px;
      margin-bottom: 8px;
      border-top: 1px solid #eee;
      border-right: 1px solid #eee;
      border-bottom: 1px solid #eee;
    }
    .alert-card .summary { color: #444; margin-top: 4px; }

    .action-list { list-style: none; padding: 0; margin: 0; }
    .action-list li {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-left: 3px solid #f57f17;
      border-radius: 0 6px 6px 0;
      padding: 8px 14px;
      margin-bottom: 6px;
    }

    details > summary {
      cursor: pointer;
      color: #1565c0;
      font-size: 12px;
      margin-top: 6px;
      user-select: none;
    }
    details > summary:hover { text-decoration: underline; }
    details pre {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 6px;
    }

    .empty { color: #aaa; font-size: 13px; padding: 8px 0; }

    .run-selector { margin-bottom: 20px; }
    .run-selector select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
<nav>
  <span class="title">Calendar Concierge</span>
  <a href="/">Latest</a>
  <a href="/history">History</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
